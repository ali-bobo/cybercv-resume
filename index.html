<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    Content-Security-Policy:
    - script-src 只允許 unpkg CDN + unsafe-inline（Babel 在瀏覽器轉譯 JSX 的必要條件）
    - style-src 允許 Google Fonts + unsafe-inline
    - 禁止 object / frame 嵌入
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://unpkg.com 'unsafe-inline';
                 style-src  'self' https://fonts.googleapis.com 'unsafe-inline';
                 font-src   'self' https://fonts.gstatic.com;
                 img-src    'self' data:;
                 object-src 'none';
                 frame-src  'none';" />
  <title>_GOBLIN · 資安工程師 · 系統架構師</title>
  <meta name="description" content="哥布林 · 資安工程師。擅長資安技術、系統架構、系統維運。" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-screen-label="01 Resume Site">

  <div id="root"></div>

  <!-- 內容設定檔 — 修改這個檔案就能更新整個網站 -->
  <script src="content.js"></script>

  <!-- Admin preview mode: if ?preview=1, override CONTENT from admin draft -->
  <script>
    (function () {
      if (!new URLSearchParams(location.search).has('preview')) return;
      try {
        var d = localStorage.getItem('cybercv_preview');
        if (d) window.CONTENT = JSON.parse(d);
      } catch (e) {}
    })();
  </script>

  <!-- React 18 production builds — SRI hash 已驗證 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
          integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
          crossorigin="anonymous"></script>
  <!--
    Babel standalone：在瀏覽器即時轉譯 JSX（無 build step 的必要前提）
    CSP 已限制 script-src 來源為 unpkg.com + 'self'
  -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Skills.jsx"></script>
  <script type="text/babel" src="Experience.jsx"></script>
  <script type="text/babel" src="Certificates.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    const { Header, Hero, About, Skills, Experience, Certificates, Projects, Contact } = window;

    function App() {
      return (
        <>
          <Header />
          <Hero />
          <About />
          <Skills />
          <Experience />
          <Certificates />
          <Projects />
          <Contact />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
